<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E5E16"/>
      <stop offset="100%" stop-color="#1FA42C"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.85" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#F7D300" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F7D300" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Logo -->
  <g transform="translate(80, 220) scale(1.6)">
    <text x="78" y="55" font-family="Arial Black, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#F7D300" transform="rotate(-12 78 55)">N</text>
    <text x="112" y="60" font-family="Arial Black, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#F7D300" transform="rotate(8 112 60)">S</text>
    <path d="M55 88 C 70 70, 130 70, 160 95 C 175 110, 165 145, 130 160 C 110 168, 90 168, 75 165 L 80 150 C 100 152, 120 150, 135 142 C 150 132, 152 115, 140 105 C 125 92, 95 92, 80 100 L 78 165 L 60 165 Z" fill="#ffffff"/>
  </g>

  <!-- Texto -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#ffffff">
    <text x="430" y="280" font-size="68" font-weight="900">Colegio NSD</text>
    <text x="430" y="340" font-size="34" font-weight="500" opacity="0.9">Centro concertado bilingüe</text>
    <text x="430" y="385" font-size="28" font-weight="400" opacity="0.85">Carabanchel · Madrid · desde 1957</text>
  </g>

  <!-- Pill -->
  <g transform="translate(430, 430)">
    <rect width="280" height="56" rx="28" fill="#F7D300"/>
    <text x="140" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0E1B14">Visítanos →</text>
  </g>
</svg>
